name: AI Developer Agent

on:
  issues:
    types: [opened]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/ai-developer.js

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          git config --global user.name "Serafim AI"
          git config --global user.email "ai@serafim.os"
          
          BRANCH_NAME="ai-fix-${ISSUE_NUMBER}"
          git checkout -b $BRANCH_NAME
          
          git add .
          if git diff --staged --quiet; then
            echo "No changes generated by AI."
            gh issue comment $ISSUE_NUMBER --body "🤖 AI Developer: Я проанализировал задачу, но не нашел, какие файлы нужно изменить."
            exit 0
          fi
          
          git commit -m "Auto-fix issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          git push origin $BRANCH_NAME
          
          gh pr create --title "🤖 AI Fix: ${ISSUE_TITLE}" \
                       --body "Автоматическое исправление для #${ISSUE_NUMBER} сгенерировано ИИ. Пожалуйста, проверьте изменения перед слиянием во вкладке 'Обновления' в приложении." \
                       --base main \
                       --head $BRANCH_NAME
